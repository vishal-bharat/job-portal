services:
  db:
    image: postgres:16-alpine
    container_name: cc-db
    environment:
      POSTGRES_DB: career_connect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - cc-db-data:/var/lib/postgresql/data
    healthcheck:
      # Run a real query so we only report healthy once the DB truly accepts SQL,
      # not just when the postmaster has started listening.
      test: ["CMD-SHELL", "pg_isready -U postgres -d career_connect && psql -U postgres -d career_connect -c 'SELECT 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  backend:
    build: ./python-backend
    container_name: cc-backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: career_connect
      DB_USER: postgres
      DB_PASSWORD: postgres
      # ── Real job API keys ─────────────────────────────────────────────────
      # JSearch (LinkedIn jobs via RapidAPI) — free 200 req/month
      #   Get key: rapidapi.com → search "JSearch" → subscribe free plan
      JSEARCH_API_KEY: "726b740e56msh836e6281d56fbf4p14bf98jsn5fad41d32402"
      # Adzuna (StepStone / German market) — free 200 req/day
      ADZUNA_APP_ID: "12d4a825"
      ADZUNA_APP_KEY: "94e7305370a8cbc1f028f2ac760e1bd9"
    expose:
      - "8080"          # reachable inside the Docker network only
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: cc-frontend
    ports:
      - "5173:80"       # the only port exposed publicly; nginx proxies /api
    depends_on:
      - backend

volumes:
  cc-db-data:
